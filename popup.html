<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auto Skip Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="panel">
    <h1>Auto Skip</h1>

    <details class="setting" open>
      <summary>
        <span>Skip to Jump Ahead Section</span>
        <label class="switch" for="skipJumpAhead">
          <input id="skipJumpAhead" type="checkbox">
          <span class="slider"></span>
        </label>
      </summary>
      <p>Auto-skip YouTube Jump Ahead sections and clickable skip prompts.</p>
    </details>

    <details class="setting">
      <summary>
        <span>Skip Ad Chapter</span>
        <label class="switch" for="skipAdChapter">
          <input id="skipAdChapter" type="checkbox">
          <span class="slider"></span>
        </label>
      </summary>
      <p>Skip chapters labeled as ad/sponsor/promotion sections.</p>
    </details>
  </main>

  <script src="popup.js"></script>
</body>
</html>
